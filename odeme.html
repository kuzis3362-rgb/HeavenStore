<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Ödeme | Heaven Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .checkout-container { max-width: 600px; margin: 50px auto; background: #fff; padding: 40px; border-radius: 15px; border: 1px solid #eee; }
        .step-title { color: var(--primary-green); font-weight: 800; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        
        .input-field { margin-bottom: 20px; }
        .input-field label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 8px; color: #666; }
        .input-field input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; outline: none; }
        .input-field input:focus { border-color: var(--primary-green); }

        .card-preview { background: var(--primary-green); color: white; padding: 25px; border-radius: 12px; margin-bottom: 30px; font-family: 'Courier New', monospace; }
        .card-no { font-size: 20px; letter-spacing: 2px; margin: 20px 0; }
        
        .btn-pay { width: 100%; background: var(--primary-green); color: white; border: none; padding: 20px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body style="background:var(--cream)">
    <div class="checkout-container">
        <h2 class="step-title">Kart Bilgileri</h2>
        
        <div class="card-preview">
            <div id="p-name">AD SOYAD</div>
            <div class="card-no" id="p-no">**** **** **** ****</div>
            <div style="display:flex; justify-content:space-between">
                <span>Heaven Card</span>
                <span id="p-date">00/00</span>
            </div>
        </div>

        <div class="input-field">
            <label>KART ÜZERİNDEKİ İSİM</label>
            <input type="text" id="c-name" oninput="kartGuncelle()" placeholder="John Doe">
        </div>
        <div class="input-field">
            <label>KART NUMARASI</label>
            <input type="text" id="c-no" oninput="kartGuncelle()" maxlength="19" placeholder="0000 0000 0000 0000">
        </div>
        <div style="display:flex; gap:20px">
            <div class="input-field" style="flex:1">
                <label>SON KULLANMA</label>
                <input type="text" id="c-date" oninput="kartGuncelle()" placeholder="AA/YY" maxlength="5">
            </div>
            <div class="input-field" style="flex:1">
                <label>CVV</label>
                <input type="password" placeholder="***" maxlength="3">
            </div>
        </div>

        <button class="btn-pay" onclick="siparisiBitir()">Ödemeyi Tamamla</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
