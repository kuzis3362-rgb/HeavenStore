<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sepetim | Heaven Store</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .cart-wrapper { max-width: 1100px; margin: 40px auto; display: grid; grid-template-columns: 2fr 1fr; gap: 30px; padding: 0 5%; }
        .cart-list { background: #fff; border-radius: 12px; padding: 20px; border: 1px solid #eee; }
        .cart-item { display: flex; gap: 20px; padding: 20px 0; border-bottom: 1px solid #f5f5f5; align-items: center; }
        .cart-item img { width: 80px; height: 100px; object-fit: cover; border-radius: 8px; }
        
        .item-details { flex: 1; }
        .item-details h4 { font-size: 16px; color: var(--primary-green); margin-bottom: 5px; }
        .item-details p { font-size: 13px; color: #777; }

        .quantity-btn { display: flex; align-items: center; gap: 15px; border: 1px solid #ddd; padding: 5px 15px; border-radius: 6px; }
        .quantity-btn button { border: none; background: none; cursor: pointer; font-size: 18px; color: var(--primary-green); font-weight: bold; }

        .summary-box { background: #fff; border-radius: 12px; padding: 25px; border: 1px solid #eee; height: fit-content; position: sticky; top: 120px; }
        .summary-box h3 { margin-bottom: 20px; font-size: 20px; border-bottom: 2px solid var(--cream); padding-bottom: 10px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; }
        .total-price { font-size: 22px; font-weight: 900; color: var(--primary-green); margin-top: 20px; border-top: 1px solid #eee; padding-top: 15px; }

        .btn-approve { width: 100%; background: var(--primary-green); color: white; border: none; padding: 18px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-approve:hover { background: var(--accent-green); }
    </style>
</head>
<body>
    <header class="header-container">
        <nav class="navbar">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor:pointer">HEAVEN<span>STORE</span></div>
            <div class="nav-icons"><a href="index.html">Alışverişe Devam Et</a></div>
        </nav>
    </header>

    <div class="cart-wrapper">
        <div class="cart-list" id="sepet-listesi">
            </div>

        <div class="summary-box" id="sepet-ozet">
            <h3>Sipariş Özeti</h3>
            <div class="summary-row"><span>Ürünün Toplamı</span><span id="ara-toplam">0 TL</span></div>
            <div class="summary-row"><span>Kargo Toplam</span><span style="color:var(--primary-green)">BEDAVA</span></div>
            <div class="summary-row total-price"><span>Toplam</span><span id="genel-toplam">0 TL</span></div>
            <button class="btn-approve" onclick="window.location.href='odeme.html'">Sepeti Onayla</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>window.onload = sepetiYukle;</script>
</body>
</html>
